{% extends 'base.html' %}

{% block title %}Профиль организации{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">
          <i class="bi bi-building"></i> Профиль организации
        </h4>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
            <div class="col-md-{% if field.name == 'description' or field.name == 'address' %}12{% else %}6{% endif %}">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
              <div class="text-danger small">{% for e in field.errors %}{{ e }}{% endfor %}</div>
              {% endif %}
            </div>
            {% endfor %}
          </div>
          <button type="submit" class="btn btn-primary mt-3">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
