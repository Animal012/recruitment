{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm rounded-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus text-primary" style="font-size: 2.5rem;"></i>
          <h3 class="fw-bold mt-2 mb-0">Регистрация</h3>
        </div>
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">
              {% for error in field.errors %}{{ error }}{% endfor %}
            </div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 mt-1">Зарегистрироваться</button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted small">
          Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
