{% extends 'base.html' %}

{% block title %}Вакансии{% endblock %}

{% block content %}
<h2 class="fw-bold mb-4">Вакансии</h2>

<div class="card shadow-sm rounded-4 mb-4">
  <div class="card-body p-3">
    <div class="row g-2">
      <div class="col-md-5">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input id="search-input" type="text" name="q" value="{{ query }}"
                 class="form-control border-start-0 ps-0" placeholder="Название, описание или требования"
                 list="search-history" autocomplete="off">
          <datalist id="search-history">
            {% for q in recent_queries %}<option value="{{ q }}">{% endfor %}
          </datalist>
        </div>
      </div>
      <div class="col-md-3">
        <select id="city-select" class="form-select">
          <option value="">Все города</option>
          {% for c in cities %}
          <option value="{{ c }}" {% if c == city %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-muted">₽</span>
          <input id="salary-input" type="number" value="{{ salary_from }}"
                 class="form-control border-start-0 ps-0" placeholder="Зарплата от">
        </div>
      </div>
    </div>
  </div>
</div>

<div id="results">
  {% include 'vacancies/_results.html' %}
</div>

<script>
(function () {
  const searchInput = document.getElementById('search-input');
  const citySelect  = document.getElementById('city-select');
  const salaryInput = document.getElementById('salary-input');
  const resultsDiv  = document.getElementById('results');
  const csrfToken   = '{{ csrf_token }}';
  let timer;

  function getParams() {
    return new URLSearchParams({
      q:           searchInput.value,
      city:        citySelect.value,
      salary_from: salaryInput.value,
    });
  }

  function fetchResults() {
    const params = getParams();
    fetch('/vacancies/?' + params.toString())
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const fresh = doc.getElementById('results');
        if (fresh) {
          resultsDiv.innerHTML = fresh.innerHTML;
          window.history.replaceState(null, '', '/vacancies/?' + params.toString());
        }
      })
      .catch(() => {});
  }

  function debounce() {
    clearTimeout(timer);
    timer = setTimeout(fetchResults, 400);
  }

  searchInput.addEventListener('input', debounce);
  citySelect.addEventListener('change', fetchResults);
  salaryInput.addEventListener('input', debounce);

  searchInput.addEventListener('blur', function () {
    const val = this.value.trim();
    if (!val) return;
    fetch('/vacancies/save-search/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': csrfToken,
      },
      body: 'query=' + encodeURIComponent(val),
    })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          const dl = document.getElementById('search-history');
          const exists = Array.from(dl.options).some(o => o.value === val);
          if (!exists) {
            const opt = document.createElement('option');
            opt.value = val;
            dl.appendChild(opt);
          }
        }
      })
      .catch(() => {});
  });
})();
</script>
{% endblock %}
